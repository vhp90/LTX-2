# ==============================================================================
#  LTX-2 Studio Model Configuration
# ==============================================================================
#
#  HOW TO USE:
#    1. Paste download URLs under the appropriate category in the "models" section.
#    2. The category name becomes the subfolder: ~/ltx-models/<category>/
#    3. The application will automatically download missing files when starting.
#
# ==============================================================================

settings:
  # Base directory to store all models
  models_dir: "~/ltx-models"
  
models:
  checkpoints:
    # LTX-2.3 22B Checkpoint (approx 22GB)
    - https://huggingface.co/Lightricks/LTX-2.3-fp8/blob/main/ltx-2.3-22b-dev-fp8.safetensors

  loras:
    # Distilled LoRA for Stage 2
    - https://huggingface.co/Lightricks/LTX-2.3/resolve/main/ltx-2.3-22b-distilled-lora-384.safetensors
    # Custom ComfyUI LoRAs
    - https://civitai.com/api/download/models/2778591?type=Model&format=SafeTensor&size=full&fp=fp16
    - https://civitai.com/api/download/models/2778606?type=Model&format=SafeTensor
    - https://civitai.com/api/download/models/2770256?type=Model&format=SafeTensor
    - https://civitai.com/api/download/models/2809352?type=Model&format=SafeTensor

  upsampler:
    # Spatial Upsampler 
    - https://huggingface.co/Lightricks/LTX-2.3/resolve/main/ltx-2.3-spatial-upscaler-x2-1.1.safetensors

  gemma:
    # Gemma 3 Text Encoder (4B-IT) - Entire folder will be downloaded
    - https://huggingface.co/grimjim/gemma-3-12b-it-norm-preserved-biprojected-abliterated
